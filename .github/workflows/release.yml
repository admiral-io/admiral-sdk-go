name: Release

# Triggered by sync commits pushed from admiral-protos:
#   - push to master  → admiral-protos tag-triggered cascade. semantic-release
#                        cuts a regular release tag (vX.Y.Z) from conventional
#                        commits.
#   - push to next    → admiral-protos master-triggered "rolling RC" cascade.
#                        semantic-release cuts a pre-release tag
#                        (vX.Y.Z-rc.N) so external testers can
#                        `go get @vX.Y.Z-rc.1`.
#
# Branch-specific behavior is configured in .releaserc.json:
#   master → stable (vX.Y.Z)
#   next   → prerelease "rc" (vX.Y.Z-rc.N)

on:
  push:
    branches:
      - master
      - next
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          # semantic-release needs all tags locally to compute prerelease
          # increments (e.g., recognize vX.Y.Z-rc.1 exists so the next push
          # cuts vX.Y.Z-rc.2 instead of re-attempting vX.Y.Z-rc.1).
          fetch-tags: true
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release
